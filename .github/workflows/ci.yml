name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build contracts
        run: npm run build

      - name: Generate sample signature
        run: npm run sign

      - name: Run Foundry tests
        run: npm run test

      - name: Run end-to-end demo
        run: |
          anvil --host 127.0.0.1 --port 8545 > /tmp/anvil.log 2>&1 &
          sleep 2
          npm run demo
